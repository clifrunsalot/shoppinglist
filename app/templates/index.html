<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Grocery List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --accent: #16a34a;
      --accent-strong: #166534;
      --accent-soft: #dcfce7;
      --accent-soft-border: #86efac;
      --accent-surface: rgba(22, 163, 74, 0.16);
      --accent-shadow: rgba(22, 163, 74, 0.22);
      --page-bg: linear-gradient(180deg, #f3f7f2 0%, #eef6f0 100%);
    }

    body[data-theme="ocean"] {
      --accent: #0284c7;
      --accent-strong: #0f4c81;
      --accent-soft: #dbeafe;
      --accent-soft-border: #7dd3fc;
      --accent-surface: rgba(2, 132, 199, 0.16);
      --accent-shadow: rgba(2, 132, 199, 0.24);
      --page-bg: linear-gradient(180deg, #eff6ff 0%, #e0f2fe 100%);
    }

    body[data-theme="sunset"] {
      --accent: #ea580c;
      --accent-strong: #9a3412;
      --accent-soft: #ffedd5;
      --accent-soft-border: #fdba74;
      --accent-surface: rgba(234, 88, 12, 0.16);
      --accent-shadow: rgba(234, 88, 12, 0.24);
      --page-bg: linear-gradient(180deg, #fff7ed 0%, #ffedd5 100%);
    }

    body[data-theme="berry"] {
      --accent: #be185d;
      --accent-strong: #831843;
      --accent-soft: #fce7f3;
      --accent-soft-border: #f9a8d4;
      --accent-surface: rgba(190, 24, 93, 0.16);
      --accent-shadow: rgba(190, 24, 93, 0.24);
      --page-bg: linear-gradient(180deg, #fdf2f8 0%, #fce7f3 100%);
    }

    [x-cloak] {
      display: none !important;
    }

    body {
      -webkit-tap-highlight-color: transparent;
      background: var(--page-bg);
      transition: background 220ms ease, color 220ms ease;
    }

    .theme-header {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
    }

    .header-cart-badge {
      width: 2.6rem;
      height: 2.6rem;
      border-radius: 9999px;
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: 0 10px 18px -10px rgba(2, 6, 23, 0.95), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-cart-icon {
      width: 1.55rem;
      height: 1.55rem;
      color: #ffffff;
      display: block;
    }

    .theme-filter {
      border-color: #e5e7eb;
      background: rgba(255, 255, 255, 0.92);
      color: #6b7280;
    }

    .theme-filter:hover {
      border-color: var(--accent-soft-border);
    }

    .theme-filter-active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .theme-badge {
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .theme-field {
      background: #f9fafb;
      transition: box-shadow 160ms ease, border-color 160ms ease;
    }

    .theme-field:focus {
      outline: none;
      border-color: var(--accent-soft-border);
      box-shadow: 0 0 0 3px var(--accent-surface);
    }

    .theme-primary {
      background: var(--accent);
      color: white;
    }

    .theme-primary:hover {
      background: var(--accent-strong);
    }

    .theme-primary:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-surface);
    }

    .theme-outline {
      border-color: var(--accent-soft-border);
      color: var(--accent);
    }

    .theme-outline:hover {
      background: var(--accent-soft);
    }

    .theme-selected {
      box-shadow: 0 0 0 2px var(--accent), 0 18px 26px -24px var(--accent-shadow);
    }

    @keyframes slide-in-from-bottom {
      from {
        transform: translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .animate-in {
      animation: slide-in-from-bottom 300ms ease-out;
    }
  </style>
</head>

<body class="flex flex-col overflow-hidden" style="height: 100dvh;" x-data="groceryApp()" x-init="init()"
  x-effect="syncDetailPanelSelection()" :data-theme="theme" x-cloak>

  <!-- TOP PANEL: fixed header -->
  <header class="theme-header text-white px-4 py-3 flex items-center justify-between flex-shrink-0 shadow-md gap-3">
    <div class="flex items-center gap-2">
      <span class="header-cart-badge" aria-hidden="true">
        <svg x-show="!hasDoneItems" class="header-cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="20" r="1.5"></circle>
          <circle cx="18" cy="20" r="1.5"></circle>
          <path d="M2 3h2.8l2.2 10.2a2 2 0 0 0 2 1.6h8.9a2 2 0 0 0 1.9-1.5L21 7H7.2"></path>
        </svg>
        <svg x-show="hasDoneItems" class="header-cart-icon" viewBox="0 0 20 20" fill="currentColor">
          <path d="M1.75 2.5a.75.75 0 000 1.5h1.35l1.84 8.004A2.25 2.25 0 007.132 14h6.986a2.25 2.25 0 002.193-1.746l1.12-4.75A1.25 1.25 0 0016.215 6H5.564L5.15 4.195A1.75 1.75 0 003.444 2.5H1.75zm6 13a1.25 1.25 0 11-2.5 0 1.25 1.25 0 012.5 0zm7.5 0a1.25 1.25 0 11-2.5 0 1.25 1.25 0 012.5 0z" />
          <path d="M8.15 9.95a.75.75 0 0 1 1.06 0l.56.56 1.52-1.52a.75.75 0 1 1 1.06 1.06l-2.05 2.05a.75.75 0 0 1-1.06 0L8.15 11a.75.75 0 0 1 0-1.06z" />
        </svg>
      </span>
      <div>
        <h1 class="text-xl font-bold tracking-tight leading-none">Grocery List</h1>
        <p class="text-xs opacity-80 mt-0.5" x-text="progressText"></p>
      </div>
    </div>
    <div class="text-right leading-tight">
      <div x-text="currentTime" class="font-mono text-sm font-semibold"></div>
      <div x-text="currentDate" class="font-mono text-xs opacity-75"></div>
    </div>
  </header>

  <!-- MIDDLE PANEL: scrollable item list -->
  <main class="flex-1 overflow-y-auto px-3 py-3">
    <!-- Filter / sort bar -->
    <div class="sticky top-0 z-20 -mx-3 px-3 pt-2 pb-2 bg-white/80 backdrop-blur-sm border-b border-white/60">
      <div class="flex items-center gap-2 flex-wrap">
        <button @click="showSettings = !showSettings" class="flex-shrink-0 flex items-center justify-center w-9 h-9 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors"
        :aria-label="showSettings ? 'Close settings' : 'Open settings'">
          <svg class="w-5 h-5 overflow-visible" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12a3 3 0 106 0 3 3 0 00-6 0z" />
        </svg>
      </button>
      <button @click="setActiveFilter('all')" class="theme-filter text-xs px-3 py-1 rounded-full border font-medium transition-colors"
        :class="activeFilter === 'all' ? 'theme-filter-active' : ''">All</button>
      <button @click="setActiveFilter('Food')" class="theme-filter text-xs px-3 py-1 rounded-full border font-medium transition-colors"
        :class="activeFilter === 'Food' ? 'theme-filter-active' : ''">Food</button>
      <button @click="setActiveFilter('Non-Food')"
        class="theme-filter text-xs px-3 py-1 rounded-full border font-medium transition-colors"
        :class="activeFilter === 'Non-Food' ? 'theme-filter-active' : ''">Non-Food</button>
      <button @click="setActiveFilter('pending')"
        class="text-xs px-3 py-1 rounded-full border font-medium transition-colors"
        :class="activeFilter === 'pending' ? 'bg-amber-500 text-white border-amber-500' : 'bg-white text-gray-500 border-gray-200 hover:border-amber-400'">Pending</button>
      <button @click="setActiveFilter('done')" class="text-xs px-3 py-1 rounded-full border font-medium transition-colors"
        :class="activeFilter === 'done' ? 'bg-gray-600 text-white border-gray-600' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-400'">Done</button>
      </div>
    </div>
    <div class="mb-3 flex items-center gap-2">
      <input x-model="searchQuery" type="text" placeholder="Filter items..."
        class="theme-field flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm text-gray-700"
        aria-label="Filter items" />
      <div class="bg-white/85 border border-gray-200 rounded-full px-3 py-2 text-xs font-medium text-gray-600 whitespace-nowrap shadow-sm">
        <span class="text-gray-400">Count</span>
        <span class="ml-1.5 font-semibold text-gray-900" x-text="filteredButtonCount"></span>
      </div>
    </div>
    <template x-if="activeFilter === 'done' && filteredItems.length">
      <div class="mb-3 flex justify-end">
        <div class="bg-white/85 border border-gray-200 rounded-full px-3 py-1 text-sm font-medium text-gray-600 shadow-sm">
          <span class="text-gray-400">Total</span>
          <span class="ml-2 font-semibold text-gray-900" x-text="doneTotalText"></span>
        </div>
      </div>
    </template>
    <template x-if="items.length === 0">
      <div class="flex flex-col items-center justify-center h-40 text-gray-400">
        <span class="text-4xl mb-2">🧺</span>
        <p class="text-sm">Your list is empty. Add an item below!</p>
      </div>
    </template>
    <ul class="space-y-2">
      <template x-for="item in filteredItems" :key="item.id">
        <li @click="selectItem(item, 'click')" @touchend.stop.prevent="selectItem(item, 'touch')"
          @keydown.enter.prevent="selectItem(item, 'keyboard')" @keydown.space.prevent="selectItem(item, 'keyboard')" tabindex="0" role="button"
          class="bg-white rounded-2xl shadow-sm px-4 py-3 flex items-center gap-3 cursor-pointer transition-all active:scale-95"
          :class="selectedItem && selectedItem.id === item.id
                      ? 'theme-selected'
                      : 'hover:shadow-md'">
          <!-- Checkbox -->
          <button @click.stop="checkboxClick(item)" @touchend.stop
            class="text-2xl leading-none flex-shrink-0 transition-transform active:scale-90"
            :aria-label="item.checked ? 'Mark pending' : 'Mark done'">
            <span x-text="item.checked ? '✅' : '⬜'"></span>
          </button>
          <!-- Info -->
          <div class="flex-1 min-w-0">
            <p class="font-medium truncate transition-colors"
              :class="item.checked ? 'line-through text-gray-400' : 'text-gray-800'" x-text="item.name"></p>
            <p class="text-xs text-gray-400 truncate mt-0.5" x-text="[item.quantity ? item.quantity + (item.unit ? ' - ' + item.unit : '') : '',
                         item.category].filter(Boolean).join(' · ')"></p>
          </div>
          <!-- Category badge -->
          <template x-if="item.category">
            <span
              class="theme-badge hidden sm:inline-block text-xs rounded-full px-2 py-0.5 font-medium flex-shrink-0"
              x-text="item.category"></span>
          </template>
          <!-- Delete -->
          <button @click.stop="deleteItem(item)" @touchend.stop
            class="text-gray-300 hover:text-red-400 text-xl leading-none flex-shrink-0 transition-colors"
            aria-label="Delete item">✕</button>
        </li>
      </template>
    </ul>
  </main>

  <!-- SETTINGS MODAL -->
  <template x-if="showSettings">
    <div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 flex items-end" @click="showSettings = false">
      <div class="bg-white w-full rounded-t-3xl shadow-2xl p-6 animate-in slide-in-from-bottom" @click.stop style="max-height: 50vh; overflow-y: auto;">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-lg font-semibold text-gray-900">Settings</h2>
          <button @click="showSettings = false" class="text-gray-400 hover:text-gray-600 transition-colors" aria-label="Close settings">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        <div class="space-y-6">
          <!-- Theme Section -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-3">Color Theme</label>
            <div class="flex flex-wrap gap-3">
              <template x-for="option in themeOptions" :key="option.id">
                <button type="button" @click="setTheme(option.id)" 
                  class="flex flex-col items-center gap-2 p-3 rounded-xl border-2 transition-all"
                  :class="theme === option.id ? 'border-gray-900 bg-gray-50' : 'border-gray-200 hover:border-gray-300'"
                  :title="`Switch to ${option.label}`">
                  <span class="w-10 h-10 rounded-full border-4 border-white shadow-md block" :style="`background:${option.preview}`"></span>
                  <span class="text-xs font-medium text-gray-700" x-text="option.label"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- Store Management Section -->
          <div class="border-t pt-6">
            <label class="block text-sm font-medium text-gray-700 mb-3">Manage Stores</label>
            <div class="space-y-2 mb-3">
              <template x-for="store in stores" :key="store.id">
                <div class="flex items-center gap-2 bg-gray-50 rounded-lg px-3 py-2">
                  <span class="flex-1 text-sm text-gray-700" x-text="store.name"></span>
                  <button @click="deleteStore(store.id)" class="text-gray-400 hover:text-red-500 transition-colors text-sm font-medium">Delete</button>
                </div>
              </template>
              <template x-if="stores.length === 0">
                <div class="text-sm text-gray-400 text-center py-2">No stores yet</div>
              </template>
            </div>
            <div class="flex gap-2">
              <input x-model="newStoreName" @keydown.enter="addStore()" placeholder="New store name..." 
                class="theme-field flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm" />
              <button @click="addStore()" :disabled="!newStoreName.trim()" 
                class="theme-primary px-3 py-2 text-sm font-medium rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                Add
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- BOTTOM PANEL: detail or add-item form -->
  <footer class="bg-white border-t border-gray-200 flex-shrink-0 shadow-[0_-2px_12px_rgba(0,0,0,0.06)]"
    style="max-height: 44vh; overflow-y: auto;">

    <!-- Detail view (item selected) -->
    <template x-if="selectedItem">
      <div class="p-4 space-y-3 flex flex-col h-full">
        <!-- Header -->
        <div class="flex items-center justify-between flex-shrink-0">
          <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Item Details</h2>
          <button @click="selectedItem = null" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">✕ Close</button>
        </div>

        <!-- Tab buttons -->
        <div class="flex gap-2 border-b border-gray-200 -mx-4 px-4 flex-shrink-0">
          <button @click="detailTab = 'detail'" :class="detailTab === 'detail' ? 'border-b-2 border-gray-900 text-gray-900 font-medium' : 'text-gray-500 hover:text-gray-700'"
            class="py-2 px-1 text-sm transition-colors">Detail</button>
          <button @click="detailTab = 'advanced'" :class="detailTab === 'advanced' ? 'border-b-2 border-gray-900 text-gray-900 font-medium' : 'text-gray-500 hover:text-gray-700'"
            class="py-2 px-1 text-sm transition-colors">Advanced</button>
        </div>

        <!-- Tab content (scrollable) -->
        <div class="flex-1 overflow-y-auto">
          <!-- Detail Tab -->
          <template x-if="detailTab === 'detail'">
            <div class="space-y-3 text-sm pt-3">
              <!-- Name -->
              <div>
                <p class="text-xs text-gray-400 mb-1">Name</p>
                <input x-model="selectedItem.name" @change="updateField(selectedItem, 'name', selectedItem.name)"
                  @keydown.enter="$el.blur()" class="theme-field w-full font-semibold text-gray-800 border border-gray-200 rounded-lg px-2 py-1" />
              </div>

              <!-- Price -->
              <div>
                <p class="text-xs text-gray-400 mb-1">Price</p>
                <div class="relative">
                  <span class="absolute left-3 top-1/2 -translate-y-1/2 text-sm font-semibold text-gray-500">$</span>
                  <input x-model="selectedItem.price" @change="updatePrice(selectedItem, selectedItem.price)"
                    @keydown.enter="$el.blur()" inputmode="decimal" class="theme-field w-full font-semibold text-gray-800 border border-gray-200 rounded-lg pl-7 pr-2 py-1" />
                </div>
              </div>

              <!-- Quantity + Unit -->
              <div>
                <p class="text-xs text-gray-400 mb-1">Quantity & Unit</p>
                <div class="flex items-center gap-2">
                  <button @click="updateQuantity(selectedItem, selectedItem.quantity - 1)"
                    :disabled="selectedItem.quantity <= 1" class="w-8 h-8 rounded-lg border border-gray-200 flex items-center justify-center text-lg font-bold
                               text-gray-600 hover:bg-gray-100 active:bg-gray-200 disabled:opacity-30 disabled:cursor-not-allowed
                               transition-colors select-none touch-manipulation">−</button>
                  <input type="number" min="1" max="100" x-model.number="selectedItem.quantity"
                    @change="updateQuantity(selectedItem, selectedItem.quantity)"
                    class="theme-field flex-1 text-center font-semibold text-gray-800 border border-gray-200 rounded-lg py-1 [appearance:textfield]
                               [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none" />
                  <button @click="updateQuantity(selectedItem, selectedItem.quantity + 1)"
                    :disabled="selectedItem.quantity >= 100" class="w-8 h-8 rounded-lg border border-gray-200 flex items-center justify-center text-lg font-bold
                               text-gray-600 hover:bg-gray-100 active:bg-gray-200 disabled:opacity-30 disabled:cursor-not-allowed
                               transition-colors select-none touch-manipulation">+</button>
                  <input x-model="selectedItem.unit" @change="updateField(selectedItem, 'unit', selectedItem.unit)"
                    @keydown.enter="$el.blur()" placeholder="unit" class="theme-field w-20 text-sm text-gray-600 border border-gray-200 rounded-lg px-2 py-1" />
                </div>
              </div>
            </div>
          </template>

          <!-- Advanced Tab -->
          <template x-if="detailTab === 'advanced'">
            <div class="space-y-3 text-sm pt-3">
              <div>
                <p class="text-xs text-gray-400 mb-1">Category</p>
                <input x-model="selectedItem.category" list="category-options" placeholder="Category"
                  @change="updateField(selectedItem, 'category', selectedItem.category)" @keydown.enter="$el.blur()"
                  class="theme-field w-full border border-gray-200 rounded-lg px-2 py-1 text-sm" />
              </div>
              <div>
                <p class="text-xs text-gray-400 mb-1">Store</p>
                <select x-model.number="selectedItem.store_id" @change="updateField(selectedItem, 'store_id', selectedItem.store_id)"
                  class="theme-field w-full border border-gray-200 rounded-lg px-2 py-1 text-sm">
                  <option :value="null">Select a store...</option>
                  <template x-for="store in stores" :key="store.id">
                    <option :value="store.id" x-text="store.name"></option>
                  </template>
                </select>
              </div>
              <div class="text-xs text-gray-500 pt-2 border-t">
                <p>Item ID: <span class="font-mono font-semibold" x-text="selectedItem.id"></span></p>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Add item form (nothing selected) -->
    <template x-if="!selectedItem">
      <div class="p-4 space-y-3">
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Add Item</h2>
        <div class="grid grid-cols-2 gap-2">
          <input x-model="newItem.name" placeholder="Item name *" @keydown.enter="addItem()"
            class="theme-field col-span-2 border border-gray-200 rounded-xl px-3 py-2 text-sm" />
          <input x-model="newItem.quantity" placeholder="Qty (e.g. 2)" type="number" min="0" step="0.1"
            class="theme-field border border-gray-200 rounded-xl px-3 py-2 text-sm" />
          <input x-model="newItem.unit" placeholder="Unit (lbs, oz, each…)"
            class="theme-field border border-gray-200 rounded-xl px-3 py-2 text-sm" />
          <input x-model="newItem.category" list="category-options" placeholder="Category"
            class="theme-field border border-gray-200 rounded-xl px-3 py-2 text-sm" />
          <select x-model.number="newItem.store_id"
            class="theme-field col-span-2 border border-gray-200 rounded-xl px-3 py-2 text-sm">
            <option :value="null">Select a store *</option>
            <template x-for="store in stores" :key="store.id">
              <option :value="store.id" x-text="store.name"></option>
            </template>
          </select>
        </div>
        <datalist id="category-options">
          <template x-for="category in categoryOptions" :key="category">
            <option :value="category"></option>
          </template>
        </datalist>
        <button @click="addItem()" :disabled="!newItem.name.trim() || !newItem.store_id" class="theme-primary w-full disabled:opacity-40 disabled:cursor-not-allowed
                       font-semibold py-2.5 rounded-xl text-sm transition-colors">
          + Add to List
        </button>
      </div>
    </template>
  </footer>

  <script>
    function groceryApp() {
      return {
        items: [],
        stores: [],
        selectedItem: null,
        currentTime: '',
        currentDate: '',
        showSettings: false,
        theme: 'meadow',
        themeOptions: [
          { id: 'meadow', label: 'Meadow', preview: 'linear-gradient(135deg, #22c55e 0%, #166534 100%)' },
          { id: 'ocean', label: 'Ocean', preview: 'linear-gradient(135deg, #38bdf8 0%, #0f4c81 100%)' },
          { id: 'sunset', label: 'Sunset', preview: 'linear-gradient(135deg, #fb923c 0%, #9a3412 100%)' },
          { id: 'berry', label: 'Berry', preview: 'linear-gradient(135deg, #f472b6 0%, #831843 100%)' },
        ],
        activeFilter: 'all',
        searchQuery: '',
        lastTouchSelectAt: 0,
        detailTab: 'detail',
        newItem: { name: '', quantity: '', unit: '', category: '', store_id: null },
        newStoreName: '',

        filterByActiveButton(list) {
          if (this.activeFilter === 'Food') return list.filter(i => i.category === 'Food');
          if (this.activeFilter === 'Non-Food') return list.filter(i => i.category === 'Non-Food');
          if (this.activeFilter === 'pending') return list.filter(i => !i.checked);
          if (this.activeFilter === 'done') return list.filter(i => i.checked);
          return list;
        },

        get filteredButtonCount() {
          return this.filterByActiveButton(this.items).length;
        },

        get doneItemCount() {
          return this.items.filter(i => Boolean(i.checked)).length;
        },

        get hasDoneItems() {
          return this.doneItemCount > 0;
        },

        get categoryOptions() {
          const uniqueCategories = new Set(
            this.items
              .map(item => (item.category || '').trim())
              .filter(Boolean)
          );
          uniqueCategories.add('Food');
          uniqueCategories.add('Non-Food');
          return Array.from(uniqueCategories).sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
        },

        get filteredItems() {
          let list = this.filterByActiveButton(this.items);
          const query = this.searchQuery.trim().toLowerCase();
          if (query) {
            list = list.filter((item) => {
              const storeName = this.stores.find(s => s.id === item.store_id)?.name || '';
              const haystack = [item.name, item.category, item.unit, storeName]
                .filter(Boolean)
                .join(' ')
                .toLowerCase();
              return haystack.includes(query);
            });
          }
          list = [...list].sort((left, right) => left.name.localeCompare(right.name, undefined, { sensitivity: 'base' }));
          // checked items always sink to bottom within filter
          return [...list.filter(i => !i.checked), ...list.filter(i => i.checked)];
        },

        syncDetailPanelSelection() {
          const visibleItems = this.filteredItems;

          if (!visibleItems.length) {
            if (this.selectedItem) this.selectedItem = null;
            return;
          }

          if (!this.selectedItem) return;

          const stillVisible = visibleItems.some(i => i.id === this.selectedItem.id);
          if (!stillVisible) {
            this.selectedItem = null;
          }
        },

        setActiveFilter(filter) {
          if (this.activeFilter === filter) return;
          this.activeFilter = filter;
          this.selectedItem = null;
        },

        get progressText() {
          const done = this.items.filter(i => i.checked).length;
          const total = this.items.length;
          return total ? `${done} of ${total} items checked` : '';
        },

        get doneTotalText() {
          const total = this.filteredItems.reduce((sum, item) => {
            const price = Number.parseFloat(item.price);
            return sum + (Number.isFinite(price) ? price : 0);
          }, 0);
          return `$${this.formatPrice(total)}`;
        },

        init() {
          const savedTheme = window.localStorage.getItem('grocery-theme');
          if (this.themeOptions.some(option => option.id === savedTheme)) {
            this.theme = savedTheme;
          }
          this.syncThemeColor();
          document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && this.showSettings) this.showSettings = false;
          });
          this.fetchStores();
          this.fetchItems();
          this.updateClock();
          setInterval(() => this.updateClock(), 1000);
        },

        setTheme(themeId) {
          this.theme = themeId;
          window.localStorage.setItem('grocery-theme', themeId);
          this.syncThemeColor();
        },

        syncThemeColor() {
          const colors = {
            meadow: '#16a34a',
            ocean: '#0284c7',
            sunset: '#ea580c',
            berry: '#be185d',
          };
          const themeColorMeta = document.querySelector('meta[name="theme-color"]');
          if (themeColorMeta) {
            themeColorMeta.setAttribute('content', colors[this.theme] || colors.meadow);
          }
        },

        updateClock() {
          const now = new Date();
          this.currentTime = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          this.currentDate = now.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        },

        async fetchItems() {
          const res = await fetch('/api/items');
          this.items = await res.json();
        },

        async fetchStores() {
          const res = await fetch('/api/stores');
          this.stores = await res.json();
        },

        async addStore() {
          if (!this.newStoreName.trim()) return;
          try {
            const res = await fetch('/api/stores', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: this.newStoreName.trim() }),
            });
            if (!res.ok) {
              alert('Failed to add store. It may already exist.');
              return;
            }
            const createdStore = await res.json();
            this.stores.push(createdStore);
            this.newStoreName = '';
          } catch (err) {
            alert('Error adding store: ' + err.message);
          }
        },

        async deleteStore(storeId) {
          if (!confirm('Delete this store? Items using it will have their store cleared.')) return;
          try {
            const res = await fetch(`/api/stores/${storeId}`, { method: 'DELETE' });
            if (!res.ok) {
              alert('Failed to delete store.');
              return;
            }
            this.stores = this.stores.filter(s => s.id !== storeId);
            // Clear store_id from items using this store
            this.items.forEach(item => {
              if (item.store_id === storeId) {
                item.store_id = null;
              }
            });
          } catch (err) {
            alert('Error deleting store: ' + err.message);
          }
        },

        formatPrice(value) {
          const parsed = Number.parseFloat(value);
          if (!Number.isFinite(parsed) || parsed < 0) return '0.00';
          return parsed.toFixed(2);
        },

        selectItem(item, source = 'click') {
          if (source === 'click' && Date.now() - this.lastTouchSelectAt < 600) {
            return;
          }

          if (source === 'touch') {
            this.lastTouchSelectAt = Date.now();
          }

          this.selectedItem = (this.selectedItem && this.selectedItem.id === item.id)
            ? null
            : { ...item, price: this.formatPrice(item.price) };
          if (this.selectedItem) {
            this.detailTab = 'detail';
          }
        },

        async checkboxClick(item) {
          // Select the item (without deselecting if already selected), then toggle
          if (!this.selectedItem || this.selectedItem.id !== item.id) {
            this.selectedItem = { ...item };
          }
          await this.toggleChecked(item);
        },

        async updateField(item, field, value) {
          if (field === 'name' && !String(value).trim()) return;
          const res = await fetch(`/api/items/${item.id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ [field]: value }),
          });
          const updated = await res.json();
          const idx = this.items.findIndex(i => i.id === item.id);
          if (idx !== -1) this.items[idx] = updated;
          if (this.selectedItem && this.selectedItem.id === item.id) this.selectedItem = { ...updated, price: this.formatPrice(updated.price) };
        },

        async updatePrice(item, value) {
          const formatted = this.formatPrice(value);
          item.price = formatted;
          const res = await fetch(`/api/items/${item.id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ price: formatted }),
          });
          const updated = await res.json();
          const idx = this.items.findIndex(i => i.id === item.id);
          if (idx !== -1) this.items[idx] = updated;
          if (this.selectedItem && this.selectedItem.id === item.id) {
            this.selectedItem = { ...updated, price: this.formatPrice(updated.price) };
          }
        },

        async updateQuantity(item, newQty) {
          newQty = Math.min(100, Math.max(1, Math.round(newQty) || 1));
          item.quantity = newQty;
          const res = await fetch(`/api/items/${item.id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ quantity: newQty }),
          });
          const updated = await res.json();
          const idx = this.items.findIndex(i => i.id === item.id);
          if (idx !== -1) this.items[idx] = updated;
          if (this.selectedItem && this.selectedItem.id === item.id) this.selectedItem = { ...updated, price: this.formatPrice(updated.price) };
        },

        async toggleChecked(item) {
          const res = await fetch(`/api/items/${item.id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ checked: !item.checked }),
          });
          const updated = await res.json();
          const idx = this.items.findIndex(i => i.id === item.id);
          if (idx !== -1) this.items[idx] = updated;
          if (this.selectedItem && this.selectedItem.id === item.id) this.selectedItem = { ...updated, price: this.formatPrice(updated.price) };
        },

        async addItem() {
          if (!this.newItem.name.trim() || !this.newItem.store_id) return;
          const res = await fetch('/api/items', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: this.newItem.name.trim(),
              quantity: this.newItem.quantity ? parseFloat(this.newItem.quantity) : 1,
              unit: this.newItem.unit || null,
              category: this.newItem.category || null,
              store_id: this.newItem.store_id,
              price: 0,
            }),
          });
          const created = await res.json();
          this.items.push(created);
          this.newItem = { name: '', quantity: '', unit: '', category: '', store_id: null };
        },

        async deleteItem(item) {
          await fetch(`/api/items/${item.id}`, { method: 'DELETE' });
          this.items = this.items.filter(i => i.id !== item.id);
          if (this.selectedItem && this.selectedItem.id === item.id) this.selectedItem = null;
        },
      };
    }
  </script>
