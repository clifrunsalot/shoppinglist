<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Grocery List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --accent: #16a34a;
      --accent-strong: #166534;
      --accent-soft: #dcfce7;
      --accent-soft-border: #86efac;
      --accent-surface: rgba(22, 163, 74, 0.16);
      --accent-shadow: rgba(22, 163, 74, 0.22);
      --page-bg: linear-gradient(180deg, #f3f7f2 0%, #eef6f0 100%);
    }

    body[data-theme="ocean"] {
      --accent: #0284c7;
      --accent-strong: #0f4c81;
      --accent-soft: #dbeafe;
      --accent-soft-border: #7dd3fc;
      --accent-surface: rgba(2, 132, 199, 0.16);
      --accent-shadow: rgba(2, 132, 199, 0.24);
      --page-bg: linear-gradient(180deg, #eff6ff 0%, #e0f2fe 100%);
    }

    body[data-theme="sunset"] {
      --accent: #ea580c;
      --accent-strong: #9a3412;
      --accent-soft: #ffedd5;
      --accent-soft-border: #fdba74;
      --accent-surface: rgba(234, 88, 12, 0.16);
      --accent-shadow: rgba(234, 88, 12, 0.24);
      --page-bg: linear-gradient(180deg, #fff7ed 0%, #ffedd5 100%);
    }

    body[data-theme="berry"] {
      --accent: #be185d;
      --accent-strong: #831843;
      --accent-soft: #fce7f3;
      --accent-soft-border: #f9a8d4;
      --accent-surface: rgba(190, 24, 93, 0.16);
      --accent-shadow: rgba(190, 24, 93, 0.24);
      --page-bg: linear-gradient(180deg, #fdf2f8 0%, #fce7f3 100%);
    }

    [x-cloak] {
      display: none !important;
    }

    body {
      -webkit-tap-highlight-color: transparent;
      background: var(--page-bg);
      transition: background 220ms ease, color 220ms ease;
    }

    .theme-header {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
    }

    .header-cart-badge {
      width: 2.6rem;
      height: 2.6rem;
      border-radius: 9999px;
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: 0 10px 18px -10px rgba(2, 6, 23, 0.95), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-cart-icon {
      width: 1.55rem;
      height: 1.55rem;
      color: #ffffff;
      display: block;
    }

    .theme-filter {
      border-color: #e5e7eb;
      background: rgba(255, 255, 255, 0.92);
      color: #6b7280;
    }

    .theme-filter:hover {
      border-color: var(--accent-soft-border);
    }

    .theme-filter-active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .theme-badge {
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .theme-field {
      background: #f9fafb;
      transition: box-shadow 160ms ease, border-color 160ms ease;
    }

    .theme-field:focus {
      outline: none;
      border-color: var(--accent-soft-border);
      box-shadow: 0 0 0 3px var(--accent-surface);
    }

    .theme-primary {
      background: var(--accent);
      color: white;
    }

    .theme-primary:hover {
      background: var(--accent-strong);
    }

    .theme-primary:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-surface);
    }

    .theme-secondary-surface {
      background: color-mix(in srgb, var(--accent-soft) 72%, white 28%);
      border-color: color-mix(in srgb, var(--accent-soft-border) 70%, #cbd5e1 30%);
      color: color-mix(in srgb, var(--accent-strong) 78%, #334155 22%);
    }

    .theme-secondary-surface:hover {
      background: color-mix(in srgb, var(--accent-soft) 82%, white 18%);
    }

    .theme-outline {
      border-color: var(--accent-soft-border);
      color: var(--accent);
    }

    .theme-outline:hover {
      background: var(--accent-soft);
    }

    .theme-selected {
      box-shadow: 0 0 0 2px var(--accent), 0 18px 26px -24px var(--accent-shadow);
    }

    @keyframes slide-in-from-bottom {
      from {
        transform: translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .animate-in {
      animation: slide-in-from-bottom 300ms ease-out;
    }
  </style>
</head>

<body class="flex flex-col overflow-hidden overflow-x-hidden" style="height: 100dvh;" x-data="groceryApp()" x-init="init()"
  x-effect="syncDetailPanelSelection()" :data-theme="theme" x-cloak>

  <!-- TOP PANEL: fixed header -->
  <header class="theme-header text-white px-4 py-3 flex flex-col items-stretch justify-between flex-shrink-0 shadow-md gap-3 sm:flex-row sm:items-center">
    <div class="flex min-w-0 items-center gap-2">
      <span class="header-cart-badge" aria-hidden="true">
        <svg x-show="!hasDoneItems" class="header-cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="20" r="1.5"></circle>
          <circle cx="18" cy="20" r="1.5"></circle>
          <path d="M2 3h2.8l2.2 10.2a2 2 0 0 0 2 1.6h8.9a2 2 0 0 0 1.9-1.5L21 7H7.2"></path>
        </svg>
        <svg x-show="hasDoneItems" class="header-cart-icon" viewBox="0 0 20 20" fill="currentColor">
          <path d="M1.75 2.5a.75.75 0 000 1.5h1.35l1.84 8.004A2.25 2.25 0 007.132 14h6.986a2.25 2.25 0 002.193-1.746l1.12-4.75A1.25 1.25 0 0016.215 6H5.564L5.15 4.195A1.75 1.75 0 003.444 2.5H1.75zm6 13a1.25 1.25 0 11-2.5 0 1.25 1.25 0 012.5 0zm7.5 0a1.25 1.25 0 11-2.5 0 1.25 1.25 0 012.5 0z" />
          <path d="M8.15 9.95a.75.75 0 0 1 1.06 0l.56.56 1.52-1.52a.75.75 0 1 1 1.06 1.06l-2.05 2.05a.75.75 0 0 1-1.06 0L8.15 11a.75.75 0 0 1 0-1.06z" />
        </svg>
      </span>
      <div class="min-w-0">
        <h1 class="truncate text-xl font-bold tracking-tight leading-none">Grocery List</h1>
        <p class="mt-0.5 truncate text-xs opacity-80" x-text="progressText"></p>
      </div>
    </div>
    <div class="flex flex-wrap items-center justify-between gap-2 sm:justify-end sm:gap-3">
      {% if current_user.is_admin %}
      <a href="{{ url_for('admin_dashboard') }}" class="rounded-full border border-white/30 bg-white/10 px-3 py-1.5 text-xs font-semibold uppercase tracking-[0.2em] text-white transition hover:bg-white/20">
        Admin
      </a>
      {% endif %}
      <div class="min-w-0 text-left leading-tight sm:block sm:text-right">
        <div class="text-[10px] uppercase tracking-[0.2em] opacity-70">Signed in</div>
        <div class="text-sm font-semibold max-w-[14rem] truncate">{{ current_user.email }}</div>
      </div>
      <form method="post" action="{{ url_for('logout') }}">
        <button type="submit" class="rounded-full border border-white/30 bg-white/10 px-3 py-1.5 text-xs font-semibold uppercase tracking-[0.2em] text-white transition hover:bg-white/20">
          Log out
        </button>
      </form>
      <div class="text-right leading-tight ml-auto sm:ml-0">
        <div x-text="currentTime" class="font-mono text-sm font-semibold"></div>
        <div x-text="currentDate" class="hidden font-mono text-xs opacity-75 sm:block"></div>
      </div>
    </div>
  </header>

  <!-- MIDDLE PANEL: scrollable item list -->
  <main class="flex-1 min-h-0 overflow-y-auto px-3 py-3" @scroll.passive="dismissCollapsedSelection()">
    <!-- Filter / sort bar -->
    <div class="sticky top-0 z-20 -mx-3 px-3 pt-2 pb-2 bg-white/80 backdrop-blur-sm border-b border-white/60">
      <div class="flex items-center gap-2 flex-wrap">
      <button @click="toggleSettings()" class="flex-shrink-0 flex items-center justify-center w-9 h-9 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors"
        :aria-label="showSettings ? 'Close settings' : 'Open settings'">
          <svg class="w-5 h-5 overflow-visible" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12a3 3 0 106 0 3 3 0 00-6 0z" />
        </svg>
      </button>
      <button data-testid="category-filter-all" @click="setActiveFilter('all')" class="theme-filter text-xs px-3 py-1 rounded-full border font-medium transition-colors"
        :class="activeFilter === 'all' ? 'theme-filter-active' : ''">All</button>
      <template x-for="category in categoryFilters" :key="category.id">
        <button type="button" :data-testid="`category-filter-${category.id}`" @click="setActiveFilter(category.name)" class="theme-filter text-xs px-3 py-1 rounded-full border font-medium transition-colors"
          :class="activeFilter === category.name ? 'theme-filter-active' : ''" x-text="category.name"></button>
      </template>
      <button data-testid="category-filter-pending" @click="setActiveFilter('pending')"
        class="text-xs px-3 py-1 rounded-full border font-medium transition-colors"
        :class="activeFilter === 'pending' ? 'bg-amber-500 text-white border-amber-500' : 'bg-white text-gray-500 border-gray-200 hover:border-amber-400'">Pending</button>
      <button data-testid="category-filter-done" @click="setActiveFilter('done')" class="text-xs px-3 py-1 rounded-full border font-medium transition-colors"
        :class="activeFilter === 'done' ? 'bg-gray-600 text-white border-gray-600' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-400'">Done</button>
      </div>
    </div>
    <div class="mb-3 flex flex-col gap-2 sm:flex-row sm:items-center">
      <input x-model="searchQuery" @focus="dismissCollapsedSelection()" type="text" placeholder="Filter items..."
        class="theme-field flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm text-gray-700"
        aria-label="Filter items" />
      <div class="bg-white/85 border border-gray-200 rounded-full px-3 py-2 text-xs font-medium text-gray-600 shadow-sm self-start sm:self-auto">
        <span class="text-gray-400">Count</span>
        <span class="ml-1.5 font-semibold text-gray-900" x-text="filteredButtonCount"></span>
      </div>
    </div>
    <template x-if="activeFilter === 'done' && filteredItems.length">
      <div class="mb-3 flex justify-end">
        <div class="bg-white/85 border border-gray-200 rounded-full px-3 py-1 text-sm font-medium text-gray-600 shadow-sm">
          <span class="text-gray-400">Total</span>
          <span class="ml-2 font-semibold text-gray-900" x-text="doneTotalText"></span>
        </div>
      </div>
    </template>
    <template x-if="items.length === 0">
      <div class="flex flex-col items-center justify-center h-40 text-gray-400">
        <span class="text-4xl mb-2">🧺</span>
        <p class="text-sm">Your list is empty. Add an item below!</p>
      </div>
    </template>
    <ul class="space-y-2">
      <template x-for="item in filteredItems" :key="item.id">
        <li :data-testid="`item-row-${item.id}`" @click="selectItem(item, 'click')" @touchend.stop.prevent="selectItem(item, 'touch')"
          @keydown.enter.prevent="selectItem(item, 'keyboard')" @keydown.space.prevent="selectItem(item, 'keyboard')" tabindex="0" role="button"
          class="bg-white rounded-2xl shadow-sm px-4 py-3 flex items-center gap-3 cursor-pointer transition-all active:scale-95"
          :class="selectedItem && selectedItem.id === item.id
                      ? 'theme-selected'
                      : 'hover:shadow-md'">
          <!-- Checkbox -->
          <button @click.stop="checkboxClick(item)" @touchend.stop
            class="text-2xl leading-none flex-shrink-0 transition-transform active:scale-90"
            :aria-label="item.checked ? 'Mark pending' : 'Mark done'">
            <span x-text="item.checked ? '✅' : '⬜'"></span>
          </button>
          <!-- Info -->
          <div class="flex-1 min-w-0">
            <p class="font-medium truncate transition-colors"
              :class="item.checked ? 'line-through text-gray-400' : 'text-gray-800'" x-text="item.name"></p>
            <p class="text-xs text-gray-400 truncate mt-0.5" x-text="[item.quantity ? item.quantity + (item.unit ? ' - ' + item.unit : '') : '',
                         item.category].filter(Boolean).join(' · ')"></p>
          </div>
          <!-- Category badge -->
          <template x-if="item.category">
            <span
              class="theme-badge hidden sm:inline-block text-xs rounded-full px-2 py-0.5 font-medium flex-shrink-0"
              x-text="item.category"></span>
          </template>
          <!-- Delete -->
          <button @click.stop="deleteItem(item)" @touchend.stop
            class="text-gray-300 hover:text-red-400 text-xl leading-none flex-shrink-0 transition-colors"
            aria-label="Delete item">✕</button>
        </li>
      </template>
    </ul>
  </main>

  <!-- SETTINGS MODAL -->
  <template x-if="showSettings">
    <div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 flex items-end" @click="showSettings = false">
      <div class="bg-white w-full rounded-t-3xl shadow-2xl p-4 sm:p-6 animate-in slide-in-from-bottom" @click.stop style="max-height: 70vh; overflow-y: auto;">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-lg font-semibold text-gray-900">Settings</h2>
          <button @click="showSettings = false" class="text-gray-400 hover:text-gray-600 transition-colors" aria-label="Close settings">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        <div class="space-y-6">
          <!-- Theme Section -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-3">Color Theme</label>
            <div class="flex flex-wrap gap-3">
              <template x-for="option in themeOptions" :key="option.id">
                <button type="button" @click="setTheme(option.id)" 
                  class="flex flex-col items-center gap-2 p-3 rounded-xl border-2 transition-all"
                  :class="theme === option.id ? 'border-gray-900 bg-gray-50' : 'border-gray-200 hover:border-gray-300'"
                  :title="`Switch to ${option.label}`">
                  <span class="w-10 h-10 rounded-full border-4 border-white shadow-md block" :style="`background:${option.preview}`"></span>
                  <span class="text-xs font-medium text-gray-700" x-text="option.label"></span>
                </button>
              </template>
            </div>
          </div>

          <div class="border-t pt-6">
            <div class="mb-3">
              <label class="block text-sm font-medium text-gray-700">Default Grocery Items</label>
              <p class="mt-1 text-xs leading-5 text-gray-500">Import the current default grocery list into your account. If an item already exists with the same name, the default values overwrite it.</p>
            </div>
            <div class="space-y-3">
              <template x-if="importDefaultsMessage.text">
                <div data-testid="settings-import-default-items-message" class="rounded-2xl border px-3 py-2 text-sm"
                  :class="importDefaultsMessage.type === 'success' ? 'border-emerald-200 bg-emerald-50 text-emerald-700' : 'border-rose-200 bg-rose-50 text-rose-700'"
                  x-text="importDefaultsMessage.text"></div>
              </template>
              <button data-testid="settings-import-default-items" @click="importDefaultItems()" :disabled="importDefaultsSaving"
                class="theme-primary w-full rounded-lg px-3 py-2 text-sm font-medium transition-colors disabled:cursor-wait disabled:opacity-50"
                x-text="importDefaultsSaving ? 'Importing Default Items...' : 'Import Default Items'"></button>
            </div>
          </div>

          <div class="border-t pt-6">
            <div class="mb-3">
              <label class="block text-sm font-medium text-gray-700">Change Password</label>
              <p class="mt-1 text-xs leading-5 text-gray-500">Enter your current password, then choose a new one with at least 8 characters.</p>
            </div>
            <div class="space-y-3">
              <input x-model="passwordForm.current_password" type="password" autocomplete="current-password" placeholder="Current password"
                class="theme-field w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
              <input x-model="passwordForm.new_password" type="password" autocomplete="new-password" placeholder="New password"
                class="theme-field w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
              <input x-model="passwordForm.confirmation_password" type="password" autocomplete="new-password" placeholder="Confirm new password"
                class="theme-field w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
              <template x-if="passwordMessage.text">
                <div class="rounded-2xl border px-3 py-2 text-sm"
                  :class="passwordMessage.type === 'success' ? 'border-emerald-200 bg-emerald-50 text-emerald-700' : 'border-rose-200 bg-rose-50 text-rose-700'"
                  x-text="passwordMessage.text"></div>
              </template>
              <button @click="changePassword()" :disabled="passwordSaving"
                class="theme-primary w-full rounded-lg px-3 py-2 text-sm font-medium transition-colors disabled:cursor-wait disabled:opacity-50"
                x-text="passwordSaving ? 'Updating Password...' : 'Update Password'"></button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </template>

  <div class="fixed bottom-[calc(env(safe-area-inset-bottom)+1rem)] right-4 z-30 flex flex-col items-end gap-2">
    <template x-if="selectedItem && !panelOpen">
      <button data-testid="open-detail-panel" @click="openDetailPanel()"
        class="theme-secondary-surface inline-flex items-center gap-2 rounded-full border px-4 py-2.5 text-sm font-semibold shadow-[0_16px_28px_-18px_rgba(15,23,42,0.9)] backdrop-blur transition-transform hover:scale-[1.02] active:scale-[0.98]">
        <span class="text-[11px] font-bold uppercase tracking-[0.16em] text-slate-500/80">Selected</span>
        <span class="max-w-[10rem] truncate" x-text="selectedItem.name"></span>
        <span>Details</span>
      </button>
    </template>

    <button data-testid="open-add-panel" @click="openAddPanel()"
      class="theme-primary inline-flex items-center gap-2 rounded-full px-4 py-3 text-sm font-semibold shadow-[0_16px_28px_-18px_rgba(15,23,42,0.9)] transition-transform hover:scale-[1.02] active:scale-[0.98]">
      <span class="text-lg leading-none">＋</span>
      <span>Add Item</span>
    </button>
  </div>

  <template x-if="panelOpen">
    <div class="fixed inset-0 z-50 bg-black/35 backdrop-blur-sm flex items-end sm:items-stretch sm:justify-end" @click="closePanel()">
      <div class="bg-white w-full max-h-[82vh] rounded-t-[2rem] shadow-2xl overflow-hidden flex flex-col animate-in sm:max-h-none sm:h-full sm:max-w-[28rem] sm:rounded-none sm:rounded-l-[2rem]" @click.stop>
        <div class="px-4 pt-3 sm:hidden">
          <div class="mx-auto h-1.5 w-12 rounded-full bg-gray-200"></div>
        </div>

        <template x-if="panelMode === 'detail' && selectedItem">
          <div class="flex min-h-0 flex-1 flex-col">
            <div class="flex items-center justify-between gap-3 border-b border-gray-200 px-4 py-4">
              <div class="min-w-0">
                <p class="text-[11px] font-semibold uppercase tracking-[0.2em] text-gray-400">Item Details</p>
                <p class="truncate text-base font-semibold text-gray-900" x-text="selectedItem.name"></p>
              </div>
              <button data-testid="panel-close" @click="closePanel()" class="rounded-full border border-gray-200 px-3 py-1.5 text-xs font-semibold uppercase tracking-[0.16em] text-gray-500 transition hover:border-gray-300 hover:text-gray-700">Close</button>
            </div>

            <div data-testid="item-detail-panel" class="flex min-h-0 flex-1 flex-col">
              <div class="flex gap-2 px-4 pt-3">
                <button @click="detailTab = 'detail'" :class="detailTab === 'detail' ? 'border-gray-900 bg-gray-900 text-white' : 'border-gray-200 bg-white text-gray-600 hover:border-gray-300'"
                  class="rounded-full border px-3 py-1.5 text-sm font-medium transition-colors">Detail</button>
                <button data-testid="detail-tab-advanced" @click="detailTab = 'advanced'" :class="detailTab === 'advanced' ? 'border-gray-900 bg-gray-900 text-white' : 'border-gray-200 bg-white text-gray-600 hover:border-gray-300'"
                  class="rounded-full border px-3 py-1.5 text-sm font-medium transition-colors">Advanced</button>
              </div>

              <div class="flex-1 overflow-y-auto px-4 py-4">
                <template x-if="detailTab === 'detail'">
                  <div class="space-y-4 text-sm">
                    <div>
                      <p class="mb-1 text-xs text-gray-400">Name</p>
                      <input data-testid="detail-name-input" :data-item-id="selectedItem.id" x-model="selectedItem.name" @input="stageItemField(Number($el.dataset.itemId), 'name', $event.target.value)" @blur="flushItemChanges(Number($el.dataset.itemId))"
                        @keydown.enter="$el.blur()" class="theme-field w-full rounded-xl border border-gray-200 px-3 py-2 font-semibold text-gray-800" />
                    </div>

                    <div>
                      <p class="mb-1 text-xs text-gray-400">Price</p>
                      <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-sm font-semibold text-gray-500">$</span>
                        <input data-testid="detail-price-input" :data-item-id="selectedItem.id" x-model="selectedItem.price" @blur="commitPriceField(Number($el.dataset.itemId), $event.target.value)"
                          @keydown.enter="$el.blur()" inputmode="decimal" class="theme-field w-full rounded-xl border border-gray-200 py-2 pl-7 pr-3 font-semibold text-gray-800" />
                      </div>
                    </div>

                    <div>
                      <p class="mb-1 text-xs text-gray-400">Quantity & Unit</p>
                      <div class="grid grid-cols-[2.75rem_minmax(0,1fr)_2.75rem] gap-2 sm:flex sm:items-center">
                        <button :data-item-id="selectedItem.id" @click="updateQuantity({ id: Number($el.dataset.itemId) }, currentSelectedQuantity() - 1)"
                          :disabled="currentSelectedQuantity() <= 1" class="h-11 w-11 rounded-xl border border-gray-200 text-lg font-bold text-gray-600 transition-colors select-none touch-manipulation hover:bg-gray-100 active:bg-gray-200 disabled:cursor-not-allowed disabled:opacity-30">−</button>
                        <input data-testid="detail-quantity-input" :data-item-id="selectedItem.id" type="number" min="1" max="100" x-model="selectedItem.quantity"
                          @blur="commitQuantityField(Number($el.dataset.itemId), $event.target.value)"
                          class="theme-field min-w-0 rounded-xl border border-gray-200 py-2 text-center font-semibold text-gray-800 [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none" />
                        <button :data-item-id="selectedItem.id" @click="updateQuantity({ id: Number($el.dataset.itemId) }, currentSelectedQuantity() + 1)"
                          :disabled="currentSelectedQuantity() >= 100" class="h-11 w-11 rounded-xl border border-gray-200 text-lg font-bold text-gray-600 transition-colors select-none touch-manipulation hover:bg-gray-100 active:bg-gray-200 disabled:cursor-not-allowed disabled:opacity-30">+</button>
                        <input data-testid="detail-unit-input" :data-item-id="selectedItem.id" x-model="selectedItem.unit" @input="stageItemField(Number($el.dataset.itemId), 'unit', $event.target.value)" @blur="flushItemChanges(Number($el.dataset.itemId))"
                          @keydown.enter="$el.blur()" placeholder="unit" class="theme-field col-span-3 w-full rounded-xl border border-gray-200 px-3 py-2 text-sm text-gray-600 sm:col-span-1 sm:w-24" />
                      </div>
                    </div>
                  </div>
                </template>

                <template x-if="detailTab === 'advanced'">
                  <div class="space-y-4 text-sm">
                    <div>
                      <p class="mb-1 text-xs text-gray-400">Category</p>
                      <select x-ref="detailCategorySelect" x-effect="syncSelectedCategoryControl()" data-testid="detail-category-select" :data-item-id="selectedItem.id" :disabled="categorySaveItemId === selectedItem.id" @change="selectedItem.category_value = $event.target.value; saveCategorySelection(Number($el.dataset.itemId), selectedItem.category_value === '' ? null : selectedItem.category_value)"
                        class="theme-field w-full rounded-xl border border-gray-200 px-3 py-2 text-sm">
                        <option value="">No category</option>
                        <template x-for="category in categories" :key="category.id">
                          <option :value="category.name" x-text="category.name"></option>
                        </template>
                      </select>
                      <p data-testid="detail-category-saving" x-show="categorySaveItemId === selectedItem.id" class="mt-1 text-[11px] font-medium text-gray-400">Saving category...</p>
                    </div>
                    <div>
                      <p class="mb-1 text-xs text-gray-400">Store</p>
                      <select x-ref="detailStoreSelect" x-effect="syncSelectedStoreControl()" data-testid="detail-store-select" :data-item-id="selectedItem.id" :disabled="storeSaveItemId === selectedItem.id" @change="selectedItem.store_value = $event.target.value; saveStoreSelection(Number($el.dataset.itemId), selectedItem.store_value === '' ? null : Number(selectedItem.store_value))"
                        class="theme-field w-full rounded-xl border border-gray-200 px-3 py-2 text-sm">
                        <option value="">Select a store...</option>
                        <template x-for="store in stores" :key="store.id">
                          <option :value="String(store.id)" x-text="store.name"></option>
                        </template>
                      </select>
                      <p data-testid="detail-store-saving" x-show="storeSaveItemId === selectedItem.id" class="mt-1 text-[11px] font-medium text-gray-400">Saving store...</p>
                    </div>
                    <div class="border-t pt-3 text-xs text-gray-500">
                      <p>Item ID: <span class="font-mono font-semibold" x-text="selectedItem.id"></span></p>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>

        <template x-if="panelMode === 'add'">
          <div data-testid="add-item-panel" class="flex min-h-0 flex-1 flex-col">
            <div class="flex items-center justify-between gap-3 border-b border-gray-200 px-4 py-4">
              <div>
                <p class="text-[11px] font-semibold uppercase tracking-[0.2em] text-gray-400">Add Item</p>
                <p class="text-base font-semibold text-gray-900">Create a new list entry</p>
              </div>
              <button data-testid="panel-close" @click="closePanel()" class="rounded-full border border-gray-200 px-3 py-1.5 text-xs font-semibold uppercase tracking-[0.16em] text-gray-500 transition hover:border-gray-300 hover:text-gray-700">Close</button>
            </div>

            <div class="flex-1 overflow-y-auto px-4 py-4">
              <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                <input x-model="newItem.name" placeholder="Item name *" @keydown.enter="addItem()"
                  class="theme-field rounded-xl border border-gray-200 px-3 py-2 text-sm sm:col-span-2" />
                <input x-model="newItem.quantity" placeholder="Qty (e.g. 2)" type="number" min="0" step="0.1"
                  class="theme-field rounded-xl border border-gray-200 px-3 py-2 text-sm" />
                <input x-model="newItem.unit" placeholder="Unit (lbs, oz, each…)"
                  class="theme-field rounded-xl border border-gray-200 px-3 py-2 text-sm" />
                <select data-testid="new-item-category-select" x-model="newItem.category"
                  class="theme-field rounded-xl border border-gray-200 px-3 py-2 text-sm">
                  <option value="">No category</option>
                  <template x-for="category in categories" :key="category.id">
                    <option :value="category.name" x-text="category.name"></option>
                  </template>
                </select>
                <select x-model.number="newItem.store_id"
                  class="theme-field rounded-xl border border-gray-200 px-3 py-2 text-sm sm:col-span-2">
                  <option :value="null">Select a store *</option>
                  <template x-for="store in stores" :key="store.id">
                    <option :value="store.id" x-text="store.name"></option>
                  </template>
                </select>
              </div>
              <button @click="addItem()" :disabled="!newItem.name.trim() || !newItem.store_id" class="theme-primary mt-4 w-full rounded-xl py-3 text-sm font-semibold transition-colors disabled:cursor-not-allowed disabled:opacity-40">
                + Add to List
              </button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </template>

  <script>
    const initialTheme = {{ initial_theme|tojson }};

    function groceryApp() {
      return {
        items: [],
        stores: [],
        categories: [],
        selectedItem: null,
        currentTime: '',
        currentDate: '',
        showSettings: false,
        theme: initialTheme,
        themeOptions: [
          { id: 'meadow', label: 'Meadow', preview: 'linear-gradient(135deg, #22c55e 0%, #166534 100%)' },
          { id: 'ocean', label: 'Ocean', preview: 'linear-gradient(135deg, #38bdf8 0%, #0f4c81 100%)' },
          { id: 'sunset', label: 'Sunset', preview: 'linear-gradient(135deg, #fb923c 0%, #9a3412 100%)' },
          { id: 'berry', label: 'Berry', preview: 'linear-gradient(135deg, #f472b6 0%, #831843 100%)' },
        ],
        activeFilter: 'all',
        searchQuery: '',
        lastTouchSelectAt: 0,
        detailTab: 'detail',
        panelOpen: false,
        panelMode: null,
        newItem: { name: '', quantity: '', unit: '', category: '', store_id: null },
        newStoreName: '',
        passwordForm: { current_password: '', new_password: '', confirmation_password: '' },
        passwordMessage: { type: '', text: '' },
        passwordSaving: false,
        importDefaultsMessage: { type: '', text: '' },
        importDefaultsSaving: false,
        itemSaveDebounceMs: 400,
        pendingItemChanges: {},
        pendingItemTimers: {},
        pendingItemRollback: {},
        pendingItemSavePromises: {},
        storeSaveItemId: null,
        categorySaveItemId: null,
        storeRefreshTimer: null,
        itemSelectionPromise: Promise.resolve(),

        get categoryFilters() {
          const itemCategories = new Set(this.items.map(item => item.category).filter(Boolean));
          return this.categories.filter(category => itemCategories.has(category.name));
        },

        syncActiveFilter() {
          if (['all', 'pending', 'done'].includes(this.activeFilter)) {
            return;
          }

          if (!this.categoryFilters.some(category => category.name === this.activeFilter)) {
            this.activeFilter = 'all';
          }
        },

        filterByActiveButton(list) {
          this.syncActiveFilter();

          if (this.activeFilter === 'pending') return list.filter(i => !i.checked);
          if (this.activeFilter === 'done') return list.filter(i => i.checked);
          if (this.activeFilter !== 'all') return list.filter(i => i.category === this.activeFilter);
          return list;
        },

        get filteredButtonCount() {
          return this.filterByActiveButton(this.items).length;
        },

        get doneItemCount() {
          return this.items.filter(i => Boolean(i.checked)).length;
        },

        get hasDoneItems() {
          return this.doneItemCount > 0;
        },

        get filteredItems() {
          let list = this.filterByActiveButton(this.items);
          const query = this.searchQuery.trim().toLowerCase();
          if (query) {
            const storeNamesById = new Map(this.stores.map(store => [store.id, store.name]));
            list = list.filter((item) => {
              const storeName = storeNamesById.get(item.store_id) || '';
              const haystack = [item.name, item.category, item.unit, storeName]
                .filter(Boolean)
                .join(' ')
                .toLowerCase();
              return haystack.includes(query);
            });
          }
          list = [...list].sort((left, right) => {
            const sortDelta = (left.sort_order || 0) - (right.sort_order || 0);
            if (sortDelta !== 0) {
              return sortDelta;
            }
            return left.name.localeCompare(right.name, undefined, { sensitivity: 'base' });
          });
          // checked items always sink to bottom within filter
          return [...list.filter(i => !i.checked), ...list.filter(i => i.checked)];
        },

        syncDetailPanelSelection() {
          const visibleItems = this.filteredItems;

          if (!visibleItems.length) {
            if (this.selectedItem) {
              this.flushSelectedItemChanges();
              this.selectedItem = null;
              if (this.panelMode === 'detail') {
                this.panelOpen = false;
                this.panelMode = null;
              }
            }
            return;
          }

          if (!this.selectedItem) return;

          const stillVisible = visibleItems.some(i => i.id === this.selectedItem.id);
          if (!stillVisible) {
            this.flushSelectedItemChanges();
            this.selectedItem = null;
            if (this.panelMode === 'detail') {
              this.panelOpen = false;
              this.panelMode = null;
            }
          }
        },

        setActiveFilter(filter) {
          if (this.activeFilter === filter) return;
          this.flushSelectedItemChanges();
          this.activeFilter = filter;
          this.selectedItem = null;
          if (this.panelMode === 'detail') {
            this.panelOpen = false;
            this.panelMode = null;
          }
        },

        get progressText() {
          const done = this.items.filter(i => i.checked).length;
          const total = this.items.length;
          return total ? `${done} of ${total} items checked` : '';
        },

        get doneTotalText() {
          const total = this.filteredItems.reduce((sum, item) => {
            const price = Number.parseFloat(item.price);
            return sum + (Number.isFinite(price) ? price : 0);
          }, 0);
          return `$${this.formatPrice(total)}`;
        },

        init() {
          this.syncThemeColor();
          document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && this.showSettings) this.showSettings = false;
            if (e.key === 'Escape' && this.panelOpen) this.closePanel();
          });
          window.addEventListener('beforeunload', () => {
            this.flushSelectedItemChanges();
          });
          window.addEventListener('focus', () => {
            this.refreshStoresSilently();
          });
          document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
              this.flushSelectedItemChanges();
            }
            if (!document.hidden) {
              this.refreshStoresSilently();
            }
          });
          this.fetchStores();
          this.fetchCategories();
          this.fetchItems();
          this.updateClock();
          setInterval(() => this.updateClock(), 1000);
          this.storeRefreshTimer = window.setInterval(() => this.refreshStoresSilently(), 30000);
        },

        async setTheme(themeId) {
          if (!this.themeOptions.some(option => option.id === themeId)) {
            return;
          }
          this.theme = themeId;
          this.syncThemeColor();
          try {
            const res = await fetch('/api/preferences/theme', {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ theme: themeId }),
            });
            if (!res.ok) {
              throw new Error('Unable to save theme preference.');
            }
          } catch (err) {
            alert(err.message);
          }
        },

        clearPasswordMessage() {
          this.passwordMessage = { type: '', text: '' };
        },

        clearImportDefaultsMessage() {
          this.importDefaultsMessage = { type: '', text: '' };
        },

        resetPasswordForm() {
          this.passwordForm = { current_password: '', new_password: '', confirmation_password: '' };
        },

        setSelectedItemFromState(item) {
          this.selectedItem = item
            ? {
                ...item,
                price: this.formatPrice(item.price),
                category_value: item.category || '',
                store_value: item.store_id == null ? '' : String(item.store_id),
              }
            : null;
        },

        currentSelectedQuantity() {
          if (!this.selectedItem) {
            return 1;
          }

          const quantity = Number(this.selectedItem.quantity);
          if (!Number.isFinite(quantity)) {
            return 1;
          }

          return Math.min(100, Math.max(1, Math.round(quantity)));
        },

        async dismissCollapsedSelection() {
          if (!this.selectedItem || this.panelOpen) {
            return;
          }

          await this.flushSelectedItemChanges();
          this.selectedItem = null;
        },

        async toggleSettings() {
          if (!this.showSettings) {
            await this.dismissCollapsedSelection();
          }
          this.showSettings = !this.showSettings;
        },

        async openAddPanel() {
          await this.flushSelectedItemChanges();
          this.selectedItem = null;
          this.panelMode = 'add';
          this.panelOpen = true;
          this.showSettings = false;
        },

        openDetailPanel(item = null) {
          const nextItem = item || this.selectedItem;
          if (!nextItem) {
            return;
          }
          this.setSelectedItemFromState(nextItem);
          this.detailTab = 'detail';
          this.panelMode = 'detail';
          this.panelOpen = true;
          this.showSettings = false;
        },

        async closePanel() {
          if (this.panelMode === 'detail') {
            await this.flushSelectedItemChanges();
          }
          this.panelOpen = false;
          this.panelMode = null;
        },

        async closeSelectedItem() {
          await this.flushSelectedItemChanges();
          this.panelOpen = false;
          this.panelMode = null;
          this.selectedItem = null;
        },

        syncSelectedStoreControl() {
          const select = this.$refs.detailStoreSelect;
          const nextValue = this.selectedItem?.store_value ?? '';
          if (!select) {
            return;
          }

          window.requestAnimationFrame(() => {
            if (this.$refs.detailStoreSelect === select && select.value !== nextValue) {
              select.value = nextValue;
            }
          });
        },

        syncSelectedCategoryControl() {
          const select = this.$refs.detailCategorySelect;
          const nextValue = this.selectedItem?.category_value ?? '';
          if (!select) {
            return;
          }

          window.requestAnimationFrame(() => {
            if (this.$refs.detailCategorySelect === select && select.value !== nextValue) {
              select.value = nextValue;
            }
          });
        },

        replaceItemInState(updatedItem) {
          const index = this.items.findIndex(existingItem => existingItem.id === updatedItem.id);
          if (index === -1) {
            return;
          }

          this.items.splice(index, 1, updatedItem);
          this.syncActiveFilter();
          if (this.selectedItem && this.selectedItem.id === updatedItem.id) {
            this.setSelectedItemFromState(updatedItem);
          }
        },

        applyOptimisticItemUpdate(itemId, changes) {
          const index = this.items.findIndex(existingItem => existingItem.id === itemId);
          if (index === -1) {
            return null;
          }

          const previousItem = { ...this.items[index] };
          const nextItem = { ...previousItem, ...changes };
          this.items.splice(index, 1, nextItem);
          if (this.selectedItem && this.selectedItem.id === itemId) {
            this.setSelectedItemFromState(nextItem);
          }
          return previousItem;
        },

        getItemStateSnapshot(itemId) {
          const item = this.items.find(existingItem => existingItem.id === itemId);
          return item ? { ...item } : null;
        },

        clearPendingItemTimer(itemId) {
          const timerId = this.pendingItemTimers[itemId];
          if (!timerId) {
            return;
          }

          window.clearTimeout(timerId);
          delete this.pendingItemTimers[itemId];
        },

        clearPendingItemState(itemId) {
          this.clearPendingItemTimer(itemId);
          delete this.pendingItemChanges[itemId];
          delete this.pendingItemRollback[itemId];
          delete this.pendingItemSavePromises[itemId];
        },

        toLocalItemChanges(payloadChanges) {
          const localChanges = {};
          for (const [field, value] of Object.entries(payloadChanges)) {
            if (field === 'price') {
              localChanges[field] = Number.parseFloat(value) || 0;
              continue;
            }
            localChanges[field] = value;
          }
          return localChanges;
        },

        normalizeItemPatch(field, value) {
          if (field === 'price') {
            return { [field]: this.formatPrice(value) };
          }

          if (field === 'quantity') {
            const quantity = Math.min(100, Math.max(1, Math.round(Number(value)) || 1));
            return { [field]: quantity };
          }

          const normalizedValue = this.normalizeItemFieldValue(field, value);
          if (field === 'name' && !normalizedValue) {
            return null;
          }

          return { [field]: normalizedValue };
        },

        stageItemChanges(itemId, payloadChanges, { immediate = false } = {}) {
          if (!payloadChanges) {
            return;
          }

          if (!this.pendingItemRollback[itemId]) {
            const snapshot = this.getItemStateSnapshot(itemId);
            if (snapshot) {
              this.pendingItemRollback[itemId] = snapshot;
            }
          }

          this.applyOptimisticItemUpdate(itemId, this.toLocalItemChanges(payloadChanges));
          this.pendingItemChanges[itemId] = {
            ...(this.pendingItemChanges[itemId] || {}),
            ...payloadChanges,
          };

          if (immediate) {
            return this.flushItemChanges(itemId);
          }

          this.clearPendingItemTimer(itemId);
          this.pendingItemTimers[itemId] = window.setTimeout(() => {
            this.flushItemChanges(itemId);
          }, this.itemSaveDebounceMs);
        },

        collectSelectedItemDraftChanges(itemId) {
          if (!this.selectedItem || this.selectedItem.id !== itemId) {
            return null;
          }

          const currentItem = this.getItemStateSnapshot(itemId);
          if (!currentItem) {
            return null;
          }

          const draftChanges = {};
          const comparableFields = ['name', 'quantity', 'unit', 'category', 'price'];

          for (const field of comparableFields) {
            const payloadChanges = this.normalizeItemPatch(field, this.selectedItem[field]);
            if (!payloadChanges) {
              continue;
            }

            const nextValue = payloadChanges[field];
            const currentValue = field === 'price'
              ? this.formatPrice(currentItem.price)
              : (currentItem[field] ?? null);

            if (nextValue !== currentValue) {
              draftChanges[field] = nextValue;
            }
          }

          return Object.keys(draftChanges).length ? draftChanges : null;
        },

        stageItemField(itemId, field, value) {
          if (!itemId) {
            return;
          }

          const payloadChanges = this.normalizeItemPatch(field, value);
          if (!payloadChanges) {
            const currentItem = this.getItemStateSnapshot(itemId);
            if (currentItem && this.selectedItem && this.selectedItem.id === itemId) {
              this.setSelectedItemFromState(currentItem);
            }
            return;
          }

          this.stageItemChanges(itemId, payloadChanges);
        },

        async commitQuantityField(itemId, value) {
          if (!itemId) {
            return;
          }

          const payloadChanges = this.normalizeItemPatch('quantity', value);
          if (!payloadChanges) {
            const currentItem = this.getItemStateSnapshot(itemId);
            if (currentItem && this.selectedItem && this.selectedItem.id === itemId) {
              this.setSelectedItemFromState(currentItem);
            }
            return;
          }

          this.stageItemChanges(itemId, payloadChanges, { immediate: true });
          await this.flushItemChanges(itemId);
        },

        async commitPriceField(itemId, value) {
          if (!itemId) {
            return;
          }

          const payloadChanges = this.normalizeItemPatch('price', value);
          if (!payloadChanges) {
            const currentItem = this.getItemStateSnapshot(itemId);
            if (currentItem && this.selectedItem && this.selectedItem.id === itemId) {
              this.setSelectedItemFromState(currentItem);
            }
            return;
          }

          this.stageItemChanges(itemId, payloadChanges, { immediate: true });
          await this.flushItemChanges(itemId);
        },

        persistItemField(itemId, field, value) {
          if (!itemId) {
            return;
          }

          const payloadChanges = this.normalizeItemPatch(field, value);
          if (!payloadChanges) {
            return;
          }

          this.stageItemChanges(itemId, payloadChanges, { immediate: true });
        },

        async saveStoreSelection(itemId, storeId) {
          if (!itemId) {
            return;
          }

          const currentItem = this.getItemStateSnapshot(itemId);
          if (!currentItem) {
            return;
          }

          if (this.selectedItem && this.selectedItem.id === itemId) {
            this.selectedItem.store_id = storeId;
            this.selectedItem.store_value = storeId == null ? '' : String(storeId);
          }

          if (currentItem.store_id === storeId && !this.pendingItemChanges[itemId]) {
            return;
          }

          const previousItem = this.applyOptimisticItemUpdate(itemId, { store_id: storeId });
          this.storeSaveItemId = itemId;
          const savePromise = (async () => {
            try {
              const updated = await this.requestJson(`/api/items/${itemId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ store_id: storeId }),
              }, 'Unable to update item store.');
              this.replaceItemInState(updated);
              await this.fetchItems();
              if (this.selectedItem && this.selectedItem.id === itemId) {
                const refreshedItem = this.getItemStateSnapshot(itemId);
                if (refreshedItem) {
                  this.setSelectedItemFromState(refreshedItem);
                }
              }
            } catch (err) {
              if (previousItem) {
                this.restoreItem(previousItem);
              }
              alert(err.message);
            } finally {
              if (this.storeSaveItemId === itemId) {
                this.storeSaveItemId = null;
              }
              delete this.pendingItemSavePromises[itemId];
            }
          })();

          this.pendingItemSavePromises[itemId] = savePromise;
          await savePromise;
        },

        async saveCategorySelection(itemId, categoryName) {
          if (!itemId) {
            return;
          }

          const currentItem = this.getItemStateSnapshot(itemId);
          if (!currentItem) {
            return;
          }

          if (this.selectedItem && this.selectedItem.id === itemId) {
            this.selectedItem.category = categoryName;
            this.selectedItem.category_value = categoryName || '';
          }

          if (currentItem.category === categoryName && !this.pendingItemChanges[itemId]) {
            return;
          }

          const previousItem = this.applyOptimisticItemUpdate(itemId, { category: categoryName });
          this.categorySaveItemId = itemId;
          const savePromise = (async () => {
            try {
              const updated = await this.requestJson(`/api/items/${itemId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ category: categoryName }),
              }, 'Unable to update item category.');
              this.replaceItemInState(updated);
            } catch (err) {
              if (previousItem) {
                this.restoreItem(previousItem);
              }
              alert(err.message);
            } finally {
              if (this.categorySaveItemId === itemId) {
                this.categorySaveItemId = null;
              }
              delete this.pendingItemSavePromises[itemId];
            }
          })();

          this.pendingItemSavePromises[itemId] = savePromise;
          await savePromise;
        },

        async flushSelectedItemChanges() {
          const itemId = this.selectedItem?.id;
          if (!itemId) {
            return;
          }

          const draftChanges = this.collectSelectedItemDraftChanges(itemId);
          if (draftChanges) {
            this.stageItemChanges(itemId, draftChanges);
          }

          await this.flushItemChanges(itemId);
        },

        async flushItemChanges(itemId) {
          const inFlightPromise = this.pendingItemSavePromises[itemId];
          if (inFlightPromise) {
            await inFlightPromise;
            if (!this.pendingItemChanges[itemId]) {
              return;
            }
          }

          this.clearPendingItemTimer(itemId);
          const changes = this.pendingItemChanges[itemId];
          if (!changes) {
            return;
          }

          delete this.pendingItemChanges[itemId];

          const savePromise = (async () => {
            try {
              const updated = await this.requestJson(`/api/items/${itemId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(changes),
              }, 'Unable to update item.');
              this.replaceItemInState(updated);

              if (this.pendingItemChanges[itemId]) {
                this.pendingItemRollback[itemId] = { ...updated };
              } else {
                delete this.pendingItemRollback[itemId];
              }
            } catch (err) {
              const rollbackItem = this.pendingItemRollback[itemId];
              this.clearPendingItemState(itemId);
              if (rollbackItem) {
                this.restoreItem(rollbackItem);
              }
              alert(err.message);
              return;
            } finally {
              delete this.pendingItemSavePromises[itemId];
            }

            if (this.pendingItemChanges[itemId]) {
              await this.flushItemChanges(itemId);
            }
          })();

          this.pendingItemSavePromises[itemId] = savePromise;
          await savePromise;
        },

        restoreItem(previousItem) {
          if (!previousItem) {
            return;
          }

          this.replaceItemInState(previousItem);
        },

        removeItemFromState(itemId) {
          const index = this.items.findIndex(existingItem => existingItem.id === itemId);
          if (index === -1) {
            return null;
          }

          const [removedItem] = this.items.splice(index, 1);
          this.syncActiveFilter();
          if (this.selectedItem && this.selectedItem.id === itemId) {
            this.selectedItem = null;
            if (this.panelMode === 'detail') {
              this.panelOpen = false;
              this.panelMode = null;
            }
          }
          return { item: removedItem, index };
        },

        restoreRemovedItem(snapshot) {
          if (!snapshot) {
            return;
          }

          this.items.splice(snapshot.index, 0, snapshot.item);
          this.syncActiveFilter();
        },

        normalizeItemFieldValue(field, value) {
          if (field === 'store_id') {
            return value === '' || value === null ? null : value;
          }

          if (typeof value !== 'string') {
            return value;
          }

          const trimmedValue = value.trim();
          if (field === 'name') {
            return trimmedValue;
          }

          return trimmedValue || null;
        },

        async requestJson(url, options = {}, defaultMessage = 'Request failed.') {
          const res = await fetch(url, options);
          const contentType = res.headers.get('content-type') || '';
          const payload = contentType.includes('application/json') ? await res.json() : null;

          if (!res.ok) {
            throw new Error(payload?.error || defaultMessage);
          }

          return payload;
        },

        async changePassword() {
          this.passwordSaving = true;
          this.clearPasswordMessage();

          try {
            const res = await fetch('/api/account/password', {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.passwordForm),
            });
            const payload = await res.json();
            if (!res.ok) {
              throw new Error(payload.error || 'Unable to update password.');
            }

            this.passwordMessage = { type: 'success', text: 'Password updated successfully.' };
            this.resetPasswordForm();
          } catch (err) {
            this.passwordMessage = { type: 'error', text: err.message };
          } finally {
            this.passwordSaving = false;
          }
        },

        async importDefaultItems() {
          this.importDefaultsSaving = true;
          this.clearImportDefaultsMessage();

          try {
            const payload = await this.requestJson('/api/account/import-default-items', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({}),
            }, 'Unable to import default items.');

            await Promise.all([this.fetchStores(), this.fetchCategories(), this.fetchItems()]);

            const summary = [];
            if (payload.created_count) {
              summary.push(`${payload.created_count} added`);
            }
            if (payload.overwritten_count) {
              summary.push(`${payload.overwritten_count} overwritten`);
            }

            this.importDefaultsMessage = {
              type: 'success',
              text: summary.length ? `Default items imported: ${summary.join(', ')}.` : 'Default items are already up to date.',
            };
          } catch (err) {
            this.importDefaultsMessage = { type: 'error', text: err.message };
          } finally {
            this.importDefaultsSaving = false;
          }
        },

        syncThemeColor() {
          const colors = {
            meadow: '#16a34a',
            ocean: '#0284c7',
            sunset: '#ea580c',
            berry: '#be185d',
          };
          const themeColorMeta = document.querySelector('meta[name="theme-color"]');
          if (themeColorMeta) {
            themeColorMeta.setAttribute('content', colors[this.theme] || colors.meadow);
          }
        },

        updateClock() {
          const now = new Date();
          this.currentTime = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          this.currentDate = now.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        },

        async fetchItems() {
          this.items = await this.requestJson('/api/items', {}, 'Unable to load items.');
          this.syncActiveFilter();
        },

        async fetchStores() {
          this.stores = await this.requestJson('/api/stores', {}, 'Unable to load stores.');
        },

        async fetchCategories() {
          this.categories = await this.requestJson('/api/categories', {}, 'Unable to load categories.');
          this.syncActiveFilter();
        },

        async refreshStoresSilently() {
          try {
            await Promise.all([this.fetchStores(), this.fetchCategories()]);
          } catch (err) {
            // Keep current catalog state when background refresh fails.
          }
        },

        async addStore() {
          if (!this.newStoreName.trim()) return;
          try {
            const createdStore = await this.requestJson('/api/stores', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: this.newStoreName.trim() }),
            }, 'Failed to add store.');
            this.stores.push(createdStore);
            this.newStoreName = '';
          } catch (err) {
            alert(err.message);
          }
        },

        async deleteStore(storeId) {
          if (!confirm('Delete this store? Items using it will have their store cleared.')) return;
          const previousStores = [...this.stores];
          const previousItems = this.items.map(item => ({ ...item }));
          this.stores = this.stores.filter(store => store.id !== storeId);
          this.items = this.items.map(item => item.store_id === storeId ? { ...item, store_id: null } : item);
          if (this.selectedItem && this.selectedItem.store_id === storeId) {
            this.selectedItem = { ...this.selectedItem, store_id: null };
          }

          try {
            await this.requestJson(`/api/stores/${storeId}`, { method: 'DELETE' }, 'Failed to delete store.');
          } catch (err) {
            this.stores = previousStores;
            this.items = previousItems;
            if (this.selectedItem) {
              const restoredSelectedItem = previousItems.find(item => item.id === this.selectedItem.id);
              if (restoredSelectedItem) {
                this.setSelectedItemFromState(restoredSelectedItem);
              }
            }
            alert(err.message);
          }
        },

        formatPrice(value) {
          const parsed = Number.parseFloat(value);
          if (!Number.isFinite(parsed) || parsed < 0) return '0.00';
          return parsed.toFixed(2);
        },

        selectItem(item, source = 'click') {
          const itemId = item.id;
          this.itemSelectionPromise = this.itemSelectionPromise
            .catch(() => {})
            .then(async () => {
              if (source === 'click' && Date.now() - this.lastTouchSelectAt < 600) {
                return;
              }

              if (source === 'touch') {
                this.lastTouchSelectAt = Date.now();
              }

              await this.flushSelectedItemChanges();
              const nextItem = this.items.find(existingItem => existingItem.id === itemId) || item;
              if (this.selectedItem && this.selectedItem.id === itemId && this.panelMode === 'detail' && this.panelOpen) {
                await this.closeSelectedItem();
                return;
              }

              if (this.selectedItem && this.selectedItem.id === itemId) {
                this.selectedItem = null;
                return;
              }

              this.setSelectedItemFromState(nextItem);
            });
          return this.itemSelectionPromise;
        },

        async checkboxClick(item) {
          if (!this.selectedItem || this.selectedItem.id !== item.id) {
            this.setSelectedItemFromState(item);
          }
          await this.toggleChecked(item);
        },

        async updateField(item, field, value) {
          this.persistItemField(item.id, field, value);
        },

        async updatePrice(item, value) {
          this.persistItemField(item.id, 'price', value);
        },

        async updateQuantity(item, newQty) {
          this.stageItemChanges(item.id, this.normalizeItemPatch('quantity', newQty), { immediate: true });
        },

        async toggleChecked(item) {
          this.stageItemChanges(item.id, { checked: !item.checked }, { immediate: true });
        },

        async addItem() {
          if (!this.newItem.name.trim() || !this.newItem.store_id) return;
          try {
            const created = await this.requestJson('/api/items', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: this.newItem.name.trim(),
                quantity: this.newItem.quantity ? parseFloat(this.newItem.quantity) : 1,
                unit: this.newItem.unit || null,
                category: this.newItem.category || null,
                store_id: this.newItem.store_id,
                price: 0,
              }),
            }, 'Unable to add item.');
            this.items.push(created);
            this.newItem = { name: '', quantity: '', unit: '', category: '', store_id: null };
            this.panelOpen = false;
            this.panelMode = null;
          } catch (err) {
            alert(err.message);
          }
        },

        async deleteItem(item) {
          this.clearPendingItemState(item.id);
          const removedItem = this.removeItemFromState(item.id);
          if (!removedItem) {
            return;
          }

          try {
            await this.requestJson(`/api/items/${item.id}`, { method: 'DELETE' }, 'Unable to delete item.');
          } catch (err) {
            this.restoreRemovedItem(removedItem);
            alert(err.message);
          }
        },
      };
    }
  </script>
